<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><title>Capture B — "Cột phải"</title>
<style>
:root{--primary:#FF7043;--secondary:#1565C0;--accent:#FFD600;--bg:#FFF8E1;--surface:#fff;--ink:#212121;--ink2:#616161;--success:#2E7D32;--error:#C62828}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Nunito","Segoe UI",system-ui,sans-serif;background:#2b2b2b;display:flex;flex-direction:column;align-items:center;padding:30px}
.label{color:#fff;font-weight:800;margin-bottom:14px;font-size:15px;opacity:.85}
.label small{opacity:.6;font-weight:600}
.kiosk{width:1280px;height:800px;border-radius:20px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.55);background:var(--bg);display:flex;flex-direction:column}

.head{height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:#fff;border-bottom:2px solid #FFE0B2;flex:0 0 auto}
.brand{display:flex;align-items:center;gap:12px}
.brand .mk{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#FF7043,#FF8F00);display:flex;align-items:center;justify-content:center;font-size:19px}
.brand b{font-size:21px;font-weight:900}
.btn-cam{display:flex;align-items:center;gap:8px;height:44px;padding:0 16px;border-radius:13px;background:#fff;border:2px solid var(--secondary);color:var(--secondary);font-weight:800;font-size:15px;cursor:pointer}

.body{flex:1;display:flex;gap:18px;padding:18px 18px 8px;min-height:0}
/* preview */
.preview{flex:1;position:relative;border-radius:22px;overflow:hidden;background:radial-gradient(circle at 50% 40%,#5a6b7a,#2e3a44);box-shadow:0 16px 44px rgba(0,0,0,.30);border:4px solid #fff;min-width:0}
.subject{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;font-size:220px;padding-bottom:30px}
.ghost{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;font-size:220px;padding-bottom:30px;opacity:.3;transform:translateX(-50px)}
.live{position:absolute;top:18px;right:18px;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.45);color:#fff;font-weight:800;font-size:14px;padding:7px 14px;border-radius:999px}
.live .d{width:11px;height:11px;border-radius:50%;background:#ff4d4d;animation:bl 1.1s infinite}@keyframes bl{50%{opacity:.3}}
.hint{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.94);font-weight:800;font-size:18px;padding:10px 22px;border-radius:999px;white-space:nowrap}

/* right rail */
.rail{width:300px;flex:0 0 auto;display:flex;flex-direction:column;gap:14px}
.counter{background:#FFD600;border-radius:20px;padding:14px;text-align:center;box-shadow:0 6px 16px rgba(255,214,0,.4)}
.counter .n{font-size:64px;font-weight:900;color:#3a2e00;line-height:1}
.counter .lab{font-size:15px;font-weight:800;color:#7a6200;letter-spacing:.5px}
.counter .dur{font-size:16px;font-weight:700;color:#7a6200;margin-top:4px}
.speedbox{background:#fff;border-radius:18px;padding:12px}
.speedbox .t{font-size:14px;font-weight:800;color:var(--ink2);margin:0 0 8px 2px}
.seg{display:flex;background:#FFF3D6;border-radius:13px;padding:4px;gap:4px}
.seg button{flex:1;border:none;background:transparent;border-radius:10px;padding:9px 2px;font-weight:800;font-size:14px;color:var(--ink2);cursor:pointer}
.seg button .e{font-size:22px;display:block}
.seg button.on{background:var(--primary);color:#fff;box-shadow:0 4px 12px rgba(255,112,67,.4)}
.shoot{height:120px;border-radius:20px;background:linear-gradient(135deg,#FF7043,#FF5722);border:none;color:#fff;font-weight:900;font-size:24px;cursor:pointer;box-shadow:0 10px 26px rgba(255,87,34,.5);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.shoot .ico{font-size:46px}
.btn-del{height:54px;border-radius:14px;background:#fff;border:2px solid var(--error);color:var(--error);font-weight:800;font-size:16px;cursor:pointer}
.btn-make{margin-top:auto;height:74px;border-radius:18px;background:linear-gradient(135deg,#2E7D32,#43A047);border:none;color:#fff;font-weight:900;font-size:23px;cursor:pointer;box-shadow:0 8px 22px rgba(46,125,50,.45);display:flex;align-items:center;justify-content:center;gap:10px}

/* filmstrip */
.filmwrap{flex:0 0 auto;padding:6px 18px 18px}
.filmstrip{display:flex;gap:10px;align-items:center;height:92px;background:#fff;border-radius:16px;padding:8px 12px;overflow:hidden;box-shadow:inset 0 0 0 2px #FFE0B2}
.thumb{width:104px;height:74px;border-radius:11px;background:#cdd6dd;flex:0 0 auto;position:relative;display:flex;align-items:flex-end;justify-content:center;font-size:38px;color:#90a0ab;border:3px solid transparent}
.thumb .ix{position:absolute;top:3px;left:6px;font-size:13px;font-weight:800;color:#5a6b7a}
.thumb.sel{border-color:var(--primary);transform:scale(1.05);box-shadow:0 6px 16px rgba(255,112,67,.4)}
.thumb.empty{background:repeating-linear-gradient(45deg,#f0e6cf,#f0e6cf 8px,#f7efdc 8px,#f7efdc 16px);color:#c9b896;font-size:24px;align-items:center}
</style></head>
<body>
<div class="label">Màn 2 · Variant B — "Cột phải" <small>· preview lớn bên trái, cột nút dọc bên phải, filmstrip dưới đáy</small></div>
<div class="kiosk">
  <div class="head">
    <div class="brand"><div class="mk">🎬</div><b>Xưởng phim của bé</b></div>
    <button class="btn-cam">📷 Đổi camera</button>
  </div>

  <div class="body">
    <div class="preview">
      <div class="ghost">🐢</div>
      <div class="subject">🐢</div>
      <div class="live"><span class="d"></span> ĐANG QUAY</div>
      <div class="hint">📸 Di chuyển nhân vật một chút rồi CHỤP nhé!</div>
    </div>
    <div class="rail">
      <div class="counter"><div class="n">12</div><div class="lab">TẤM ẢNH</div><div class="dur">⏱ 1.5 giây phim</div></div>
      <div class="speedbox">
        <div class="t">Tốc độ phim</div>
        <div class="seg">
          <button><span class="e">🐌</span>Chậm</button>
          <button class="on"><span class="e">🐇</span>Vừa</button>
          <button><span class="e">⚡</span>Nhanh</button>
        </div>
      </div>
      <button class="shoot"><span class="ico">📷</span>CHỤP</button>
      <button class="btn-del">↩️ Xoá tấm cuối</button>
      <button class="btn-make">🎬 TẠO PHIM</button>
    </div>
  </div>

  <div class="filmwrap">
    <div class="filmstrip">
      <div class="thumb"><span class="ix">1</span>🐢</div>
      <div class="thumb"><span class="ix">2</span>🐢</div>
      <div class="thumb"><span class="ix">3</span>🐢</div>
      <div class="thumb sel"><span class="ix">4</span>🐢</div>
      <div class="thumb"><span class="ix">5</span>🐢</div>
      <div class="thumb"><span class="ix">6</span>🐢</div>
      <div class="thumb"><span class="ix">…</span>🐢</div>
      <div class="thumb"><span class="ix">12</span>🐢</div>
      <div class="thumb empty">+ tấm mới</div>
    </div>
  </div>
</div>
</body></html>
