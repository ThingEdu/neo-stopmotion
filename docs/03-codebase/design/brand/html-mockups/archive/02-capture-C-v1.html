<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><title>Capture C — "Toàn màn"</title>
<style>
:root{--primary:#FF7043;--secondary:#1565C0;--accent:#FFD600;--bg:#FFF8E1;--surface:#fff;--ink:#212121;--ink2:#616161;--success:#2E7D32;--error:#C62828}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Nunito","Segoe UI",system-ui,sans-serif;background:#2b2b2b;display:flex;flex-direction:column;align-items:center;padding:30px}
.label{color:#fff;font-weight:800;margin-bottom:14px;font-size:15px;opacity:.85}
.label small{opacity:.6;font-weight:600}
.kiosk{width:1280px;height:800px;border-radius:20px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.55);position:relative;
  background:radial-gradient(circle at 50% 42%,#5a6b7a,#28323b)}
.subject{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;font-size:300px;padding-bottom:170px}
.ghost{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;font-size:300px;padding-bottom:170px;opacity:.3;transform:translateX(-64px)}

.counter{position:absolute;top:22px;left:22px;background:#FFD600;border-radius:22px;padding:12px 24px;text-align:center;box-shadow:0 8px 22px rgba(0,0,0,.35)}
.counter .n{font-size:62px;font-weight:900;color:#3a2e00;line-height:1}
.counter .lab{font-size:14px;font-weight:800;color:#7a6200;letter-spacing:.5px}
.counter .dur{font-size:15px;font-weight:700;color:#7a6200;margin-top:2px}

.topright{position:absolute;top:22px;right:22px;display:flex;align-items:center;gap:12px}
.live{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.5);color:#fff;font-weight:800;font-size:14px;padding:9px 16px;border-radius:999px}
.live .d{width:11px;height:11px;border-radius:50%;background:#ff4d4d;animation:bl 1.1s infinite}@keyframes bl{50%{opacity:.3}}
.btn-cam{display:flex;align-items:center;gap:8px;height:46px;padding:0 18px;border-radius:14px;background:rgba(21,101,192,.92);border:none;color:#fff;font-weight:800;font-size:15px;cursor:pointer}

.hint{position:absolute;top:24px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.92);font-weight:800;font-size:18px;padding:10px 24px;border-radius:999px}

/* floating filmstrip */
.filmstrip{position:absolute;left:50%;transform:translateX(-50%);bottom:148px;display:flex;gap:9px;align-items:center;
  background:rgba(255,255,255,.85);backdrop-filter:blur(4px);border-radius:16px;padding:8px 12px;max-width:900px;overflow:hidden}
.thumb{width:84px;height:62px;border-radius:10px;background:#cdd6dd;flex:0 0 auto;position:relative;display:flex;align-items:flex-end;justify-content:center;font-size:30px;color:#90a0ab;border:3px solid transparent}
.thumb .ix{position:absolute;top:2px;left:5px;font-size:12px;font-weight:800;color:#5a6b7a}
.thumb.sel{border-color:var(--primary);transform:scale(1.06)}
.thumb.empty{background:repeating-linear-gradient(45deg,#e7dcc4,#e7dcc4 7px,#f2e9d4 7px,#f2e9d4 14px);color:#b3a079;font-size:13px;align-items:center;width:96px;text-align:center;line-height:1.1}

/* floating control dock */
.dock{position:absolute;left:0;right:0;bottom:0;height:130px;background:linear-gradient(0deg,rgba(0,0,0,.55),rgba(0,0,0,0));
  display:flex;align-items:center;justify-content:space-between;padding:0 36px 16px}
.speed{display:flex;flex-direction:column;gap:6px;width:300px}
.speed .t{font-size:13px;font-weight:800;color:#fff;margin-left:4px;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.seg{display:flex;background:rgba(255,255,255,.92);border-radius:14px;padding:4px;gap:4px}
.seg button{flex:1;border:none;background:transparent;border-radius:10px;padding:8px 2px;font-weight:800;font-size:14px;color:var(--ink2);cursor:pointer}
.seg button .e{font-size:20px;display:block}
.seg button.on{background:var(--primary);color:#fff}
.shootwrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.shoot{width:112px;height:112px;border-radius:50%;background:linear-gradient(135deg,#FF7043,#FF5722);border:6px solid #fff;color:#fff;font-size:48px;cursor:pointer;box-shadow:0 10px 30px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center}
.shootwrap .cap{font-weight:900;font-size:15px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.6)}
.right{display:flex;align-items:center;gap:12px;width:300px;justify-content:flex-end}
.btn-del{height:54px;padding:0 18px;border-radius:14px;background:rgba(255,255,255,.92);border:2px solid var(--error);color:var(--error);font-weight:800;font-size:15px;cursor:pointer}
.btn-make{height:68px;padding:0 26px;border-radius:18px;background:linear-gradient(135deg,#2E7D32,#43A047);border:none;color:#fff;font-weight:900;font-size:22px;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.4);display:flex;align-items:center;gap:8px}
</style></head>
<body>
<div class="label">Màn 2 · Variant C — "Toàn màn" <small>· preview tràn viền, điều khiển nổi lên trên — đắm chìm nhất</small></div>
<div class="kiosk">
  <div class="ghost">🚀</div>
  <div class="subject">🚀</div>

  <div class="counter"><div class="n">12</div><div class="lab">TẤM ẢNH</div><div class="dur">⏱ 1.5 giây</div></div>
  <div class="hint">📸 Bấm CHỤP để thêm tấm mới!</div>
  <div class="topright">
    <div class="live"><span class="d"></span> ĐANG QUAY</div>
    <button class="btn-cam">📷 Đổi camera</button>
  </div>

  <div class="filmstrip">
    <div class="thumb"><span class="ix">1</span>🚀</div>
    <div class="thumb"><span class="ix">2</span>🚀</div>
    <div class="thumb"><span class="ix">3</span>🚀</div>
    <div class="thumb"><span class="ix">4</span>🚀</div>
    <div class="thumb sel"><span class="ix">5</span>🚀</div>
    <div class="thumb"><span class="ix">6</span>🚀</div>
    <div class="thumb"><span class="ix">…</span>🚀</div>
    <div class="thumb"><span class="ix">12</span>🚀</div>
    <div class="thumb empty">+ tấm mới</div>
  </div>

  <div class="dock">
    <div class="speed">
      <div class="t">Tốc độ phim</div>
      <div class="seg">
        <button><span class="e">🐌</span>Chậm</button>
        <button class="on"><span class="e">🐇</span>Vừa</button>
        <button><span class="e">⚡</span>Nhanh</button>
      </div>
    </div>
    <div class="shootwrap"><button class="shoot">📷</button><div class="cap">CHỤP (Space)</div></div>
    <div class="right">
      <button class="btn-del">↩️ Xoá tấm cuối</button>
      <button class="btn-make">🎬 TẠO PHIM</button>
    </div>
  </div>
</div>
</body></html>
