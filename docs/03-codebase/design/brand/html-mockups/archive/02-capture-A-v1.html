<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><title>Capture A — "Sân khấu"</title>
<style>
:root{--primary:#FF7043;--secondary:#1565C0;--accent:#FFD600;--bg:#FFF8E1;--surface:#fff;--ink:#212121;--ink2:#616161;--success:#2E7D32;--error:#C62828}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Nunito","Segoe UI",system-ui,sans-serif;background:#2b2b2b;display:flex;flex-direction:column;align-items:center;padding:30px}
.label{color:#fff;font-weight:800;margin-bottom:14px;font-size:15px;opacity:.85}
.label small{opacity:.6;font-weight:600}
.kiosk{width:1280px;height:800px;border-radius:20px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.55);background:var(--bg);display:flex;flex-direction:column}

/* header */
.head{height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:#fff;border-bottom:2px solid #FFE0B2;flex:0 0 auto}
.brand{display:flex;align-items:center;gap:12px}
.brand .mk{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#FF7043,#FF8F00);display:flex;align-items:center;justify-content:center;font-size:20px}
.brand b{font-size:22px;font-weight:900}
.btn-cam{display:flex;align-items:center;gap:8px;height:46px;padding:0 18px;border-radius:14px;background:#fff;border:2px solid var(--secondary);color:var(--secondary);font-weight:800;font-size:16px;cursor:pointer}

/* stage */
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:18px 24px 6px;min-height:0}
.preview{position:relative;height:100%;aspect-ratio:4/3;border-radius:22px;overflow:hidden;
  background:radial-gradient(circle at 50% 40%,#5a6b7a,#2e3a44);box-shadow:0 16px 44px rgba(0,0,0,.30);border:4px solid #fff}
.subject{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;font-size:200px;padding-bottom:30px}
.ghost{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;font-size:200px;padding-bottom:30px;opacity:.30;transform:translateX(-46px)}
/* counter badge */
.counter{position:absolute;top:18px;left:18px;background:#FFD600;border-radius:20px;padding:10px 20px;text-align:center;box-shadow:0 6px 18px rgba(0,0,0,.25)}
.counter .n{font-size:54px;font-weight:900;color:#3a2e00;line-height:1}
.counter .lab{font-size:14px;font-weight:800;color:#7a6200;letter-spacing:.5px}
.counter .dur{font-size:14px;font-weight:700;color:#7a6200;margin-top:2px}
.live{position:absolute;top:20px;right:20px;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.45);color:#fff;font-weight:800;font-size:14px;padding:7px 14px;border-radius:999px}
.live .d{width:11px;height:11px;border-radius:50%;background:#ff4d4d;animation:bl 1.1s infinite}
@keyframes bl{50%{opacity:.3}}
.hint{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.94);color:var(--ink);font-weight:800;font-size:18px;padding:10px 22px;border-radius:999px;white-space:nowrap}

/* filmstrip */
.filmwrap{flex:0 0 auto;padding:6px 24px 4px}
.filmstrip{display:flex;gap:10px;align-items:center;height:86px;overflow:hidden}
.thumb{width:108px;height:78px;border-radius:12px;background:#cdd6dd;flex:0 0 auto;position:relative;border:3px solid transparent;display:flex;align-items:flex-end;justify-content:center;font-size:40px;color:#90a0ab}
.thumb .ix{position:absolute;top:3px;left:6px;font-size:13px;font-weight:800;color:#5a6b7a}
.thumb.sel{border-color:var(--primary);transform:scale(1.05);box-shadow:0 6px 16px rgba(255,112,67,.4)}
.thumb.empty{background:repeating-linear-gradient(45deg,#f0e6cf,#f0e6cf 8px,#f7efdc 8px,#f7efdc 16px);color:#c9b896;font-size:26px;align-items:center}

/* bottom control bar */
.controls{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:18px;padding:12px 28px 22px}
.speed{display:flex;flex-direction:column;gap:6px;width:300px}
.speed .t{font-size:14px;font-weight:800;color:var(--ink2);margin-left:4px}
.seg{display:flex;background:#fff;border-radius:14px;padding:4px;box-shadow:inset 0 0 0 2px #FFE0B2}
.seg button{flex:1;border:none;background:transparent;border-radius:10px;padding:10px 4px;font-weight:800;font-size:15px;color:var(--ink2);cursor:pointer}
.seg button .e{font-size:22px;display:block}
.seg button.on{background:var(--primary);color:#fff;box-shadow:0 4px 12px rgba(255,112,67,.4)}
.shootwrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.shoot{width:108px;height:108px;border-radius:50%;background:linear-gradient(135deg,#FF7043,#FF5722);border:6px solid #fff;color:#fff;font-size:46px;cursor:pointer;box-shadow:0 10px 26px rgba(255,87,34,.5);display:flex;align-items:center;justify-content:center}
.shootwrap .cap{font-weight:900;font-size:17px;color:var(--primary)}
.right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;width:300px}
.btn-del{display:flex;align-items:center;gap:8px;height:50px;padding:0 18px;border-radius:14px;background:#fff;border:2px solid var(--error);color:var(--error);font-weight:800;font-size:16px;cursor:pointer}
.btn-make{display:flex;align-items:center;gap:10px;height:64px;padding:0 28px;border-radius:18px;background:linear-gradient(135deg,#2E7D32,#43A047);color:#fff;font-weight:900;font-size:22px;cursor:pointer;box-shadow:0 8px 22px rgba(46,125,50,.45)}
</style></head>
<body>
<div class="label">Màn 2 · Variant A — "Sân khấu" <small>· preview là tâm điểm, điều khiển lớn dưới đáy, đếm frame nổi trên preview</small></div>
<div class="kiosk">
  <div class="head">
    <div class="brand"><div class="mk">🎬</div><b>Xưởng phim của bé</b></div>
    <button class="btn-cam">📷 Đổi camera</button>
  </div>

  <div class="stage">
    <div class="preview">
      <div class="ghost">🦖</div>
      <div class="subject">🦖</div>
      <div class="counter"><div class="n">12</div><div class="lab">TẤM ẢNH</div><div class="dur">⏱ 1.5 giây</div></div>
      <div class="live"><span class="d"></span> ĐANG QUAY</div>
      <div class="hint">📸 Bấm nút CHỤP để thêm một tấm nhé!</div>
    </div>
  </div>

  <div class="filmwrap">
    <div class="filmstrip">
      <div class="thumb"><span class="ix">1</span>🦖</div>
      <div class="thumb"><span class="ix">2</span>🦖</div>
      <div class="thumb"><span class="ix">3</span>🦖</div>
      <div class="thumb"><span class="ix">4</span>🦖</div>
      <div class="thumb sel"><span class="ix">5</span>🦖</div>
      <div class="thumb"><span class="ix">…</span>🦖</div>
      <div class="thumb"><span class="ix">12</span>🦖</div>
      <div class="thumb empty">+ tấm tiếp theo</div>
    </div>
  </div>

  <div class="controls">
    <div class="speed">
      <div class="t">Tốc độ phim</div>
      <div class="seg">
        <button><span class="e">🐌</span>Chậm</button>
        <button class="on"><span class="e">🐇</span>Vừa</button>
        <button><span class="e">⚡</span>Nhanh</button>
      </div>
    </div>
    <div class="shootwrap"><button class="shoot">📷</button><div class="cap">CHỤP (Space)</div></div>
    <div class="right">
      <button class="btn-del">↩️ Xoá tấm cuối</button>
      <button class="btn-make">🎬 TẠO PHIM</button>
    </div>
  </div>
</div>
</body></html>
