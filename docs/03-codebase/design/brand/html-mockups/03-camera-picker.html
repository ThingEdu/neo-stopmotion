<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><title>Chọn camera — NeoStopMotion</title>
<style>
:root{--primary:#FF7043;--secondary:#1565C0;--accent:#FFD600;--bg:#FFF8E1;--surface:#fff;--ink:#212121;--ink2:#616161;--success:#2E7D32;--error:#C62828}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Nunito","Segoe UI",system-ui,sans-serif;background:#2b2b2b;display:flex;flex-direction:column;align-items:center;padding:30px}
.label{color:#fff;font-weight:800;margin-bottom:14px;font-size:15px;opacity:.85}
.label small{opacity:.6;font-weight:600}
kbd{font-family:ui-monospace,"SF Mono",monospace;font-size:12px;font-weight:800;background:#fff;border:2px solid #c9d3dd;border-bottom-width:3px;border-radius:7px;padding:2px 7px;color:#1565C0;line-height:1;white-space:nowrap}
.kbd-d{border-color:#d8c9a8;color:#7a6200}
.kiosk{width:1280px;height:800px;border-radius:20px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.55);background:var(--bg);position:relative}
.dim{position:absolute;inset:0;background:rgba(33,33,33,.55)}
.behind{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:160px;opacity:.25;filter:blur(2px)}
.modal{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:640px;background:#fff;border-radius:26px;box-shadow:0 24px 70px rgba(0,0,0,.5);overflow:hidden}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:20px 26px;background:#fff;border-bottom:2px solid #eee}
.mhead .ttl{display:flex;align-items:center;gap:12px;font-size:26px;font-weight:900}
.mhead .ttl .ic{width:44px;height:44px;border-radius:12px;background:#E3F0FF;display:flex;align-items:center;justify-content:center;font-size:24px}
.close{display:flex;align-items:center;gap:8px;height:46px;padding:0 14px;border-radius:12px;border:2px solid #ddd;background:#fff;font-size:15px;font-weight:800;color:var(--ink2);cursor:pointer}
.mbody{padding:24px 26px}
.camview{position:relative;aspect-ratio:4/3;border-radius:18px;overflow:hidden;background:radial-gradient(circle at 50% 40%,#5a6b7a,#2e3a44);display:flex;align-items:center;justify-content:center;border:3px solid #eee}
.camview .feed{font-size:120px}
.indicator{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.55);color:#fff;font-weight:800;font-size:16px;padding:7px 18px;border-radius:999px}
.numhint{position:absolute;top:14px;right:14px;background:rgba(0,0,0,.55);color:#fff;font-weight:700;font-size:13px;padding:6px 12px;border-radius:999px}
.nav{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:18px}
.arrow{height:64px;flex:1;border-radius:16px;border:2px solid var(--secondary);background:#fff;color:var(--secondary);font-weight:800;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.dots{display:flex;gap:8px}
.dots span{width:12px;height:12px;border-radius:50%;background:#ddd}
.dots span.on{background:var(--secondary);width:30px;border-radius:6px}
.confirm{margin-top:18px;width:100%;height:72px;border-radius:18px;border:none;background:linear-gradient(135deg,#1565C0,#1E88E5);color:#fff;font-weight:900;font-size:22px;cursor:pointer;box-shadow:0 8px 22px rgba(21,101,192,.4);display:flex;align-items:center;justify-content:center;gap:12px}
.confirm kbd{background:#fff;border-color:#fff;color:#1565C0}
.keys{display:flex;align-items:center;justify-content:center;gap:18px;margin-top:16px;font-size:13px;font-weight:700;color:var(--ink2);flex-wrap:wrap}
.keys .g{display:flex;align-items:center;gap:6px}
</style></head>
<body>
<div class="label">Màn 3 — Chọn camera (popup của Thợ Cả) <small>· thao tác hoàn toàn bằng bàn phím</small></div>
<div class="kiosk">
  <div class="behind">🎬</div>
  <div class="dim"></div>
  <div class="modal">
    <div class="mhead">
      <div class="ttl"><div class="ic">📷</div> Chọn máy ảnh</div>
      <button class="close">✕ Huỷ <kbd class="kbd-d">Esc</kbd></button>
    </div>
    <div class="mbody">
      <div class="camview">
        <div class="feed">🧒</div>
        <div class="numhint">Bấm số 1–6 để nhảy nhanh</div>
        <div class="indicator">Máy ảnh 2 / 6</div>
      </div>
      <div class="nav">
        <button class="arrow"><kbd>◀</kbd> Máy trước</button>
        <div class="dots"><span></span><span class="on"></span><span></span><span></span><span></span><span></span></div>
        <button class="arrow">Máy tiếp <kbd>▶</kbd></button>
      </div>
      <button class="confirm">✓ DÙNG MÁY ẢNH NÀY <kbd>Enter</kbd></button>
      <div class="keys">
        <div class="g"><kbd>◀</kbd><kbd>▶</kbd> đổi máy</div>
        <div class="g"><kbd>1</kbd>–<kbd>6</kbd> chọn nhanh</div>
        <div class="g"><kbd>Enter</kbd> xác nhận</div>
        <div class="g"><kbd>Esc</kbd> huỷ</div>
      </div>
    </div>
  </div>
</div>
</body></html>
