<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><title>Đang tạo phim — NeoStopMotion</title>
<style>
:root{--primary:#FF7043;--secondary:#1565C0;--accent:#FFD600;--bg:#FFF8E1;--surface:#fff;--ink:#212121;--ink2:#616161;--success:#2E7D32}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Nunito","Segoe UI",system-ui,sans-serif;background:#2b2b2b;display:flex;flex-direction:column;align-items:center;padding:30px}
.label{color:#fff;font-weight:800;margin-bottom:14px;font-size:15px;opacity:.85}
.label small{opacity:.6;font-weight:600}
.kiosk{width:1280px;height:800px;border-radius:20px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.55);
  background:radial-gradient(circle at 50% 40%,#FFFFFF,#FFF3D6 55%,#FFE0B2);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative}
.reel{font-size:150px;animation:spin 2.4s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
h1{font-size:46px;font-weight:900;margin-top:18px;color:var(--ink)}
.status{font-size:26px;color:var(--ink2);font-weight:800;margin-top:10px;height:34px}
.barwrap{width:680px;height:34px;border-radius:999px;background:#fff;margin-top:34px;overflow:hidden;box-shadow:inset 0 0 0 3px #FFE0B2}
.bar{height:100%;width:64%;border-radius:999px;background:linear-gradient(90deg,#FF7043,#FF8F00);display:flex;align-items:center;justify-content:flex-end;padding-right:14px}
.pct{font-size:46px;font-weight:900;color:var(--primary);margin-top:22px}
.tip{position:absolute;bottom:54px;font-size:20px;color:var(--ink2);font-weight:700}
.float{position:absolute;font-size:44px;opacity:.4}
</style></head>
<body>
<div class="label">Màn 5 — Đang tạo phim <small>· vòng phim quay + thanh tiến trình 0–100%</small></div>
<div class="kiosk">
  <div class="float" style="top:110px;left:160px">🎞️</div>
  <div class="float" style="top:150px;right:180px">✨</div>
  <div class="float" style="bottom:170px;left:220px">🎬</div>
  <div class="reel">🎞️</div>
  <h1>Đang ghép phim cho bé…</h1>
  <div class="status">🎵 Đang tạo ảnh động GIF…</div>
  <div class="barwrap"><div class="bar"></div></div>
  <div class="pct">64%</div>
  <div class="tip">Chờ một xíu thôi nhé, phim sắp xong rồi! 🌟</div>
</div>
</body></html>
