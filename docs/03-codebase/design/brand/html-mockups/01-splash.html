<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><title>Splash — NeoStopMotion</title>
<style>
:root{--primary:#FF7043;--secondary:#1565C0;--accent:#FFD600;--bg:#FFF8E1;--surface:#fff;--ink:#212121;--ink2:#616161}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Nunito","Segoe UI",system-ui,sans-serif;background:#2b2b2b;display:flex;flex-direction:column;align-items:center;padding:30px}
.label{color:#fff;font-weight:800;margin-bottom:14px;font-size:15px;opacity:.8}
.kiosk{width:1280px;height:800px;border-radius:20px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.55);position:relative;
  background:radial-gradient(circle at 50% 38%,#FFFFFF 0%,#FFF3D6 45%,#FFE0B2 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.logo{width:230px;height:230px;border-radius:50%;background:linear-gradient(135deg,#FF7043,#FF8F00);
  display:flex;align-items:center;justify-content:center;font-size:120px;color:#fff;
  box-shadow:0 18px 50px rgba(255,112,67,.45);margin-bottom:36px;animation:pop 1s ease}
@keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
h1{font-size:60px;font-weight:900;color:var(--ink);letter-spacing:-1px}
h1 .accent{color:var(--primary)}
.tagline{font-size:26px;color:var(--ink2);margin-top:14px;font-weight:700}
.brand{position:absolute;bottom:46px;font-size:20px;color:var(--ink2);font-weight:800}
.dots{margin-top:40px;display:flex;gap:14px}
.dot{width:18px;height:18px;border-radius:50%;background:var(--primary);opacity:.3;animation:b 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes b{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-10px)}}
.confetti{position:absolute;font-size:42px;opacity:.5}
</style></head>
<body>
<div class="label">Màn 1 — Splash (hiển thị 2 giây rồi tự vào màn chụp)</div>
<div class="kiosk">
  <div class="confetti" style="top:90px;left:140px">🎬</div>
  <div class="confetti" style="top:140px;right:170px">✨</div>
  <div class="confetti" style="bottom:160px;left:200px">🎞️</div>
  <div class="confetti" style="bottom:120px;right:230px">⭐</div>
  <div class="logo">🎬</div>
  <h1>Neo<span class="accent">StopMotion</span></h1>
  <div class="tagline">Xưởng làm phim hoạt hình của bé 🎨</div>
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  <div class="brand">Maker Việt × ThingEdu</div>
</div>
</body></html>
