<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><title>Xoá frame — NeoStopMotion</title>
<style>
:root{--primary:#FF7043;--secondary:#1565C0;--accent:#FFD600;--bg:#FFF8E1;--surface:#fff;--ink:#212121;--ink2:#616161;--success:#2E7D32;--error:#C62828}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Nunito","Segoe UI",system-ui,sans-serif;background:#2b2b2b;display:flex;flex-direction:column;align-items:center;padding:30px}
.label{color:#fff;font-weight:800;margin-bottom:14px;font-size:15px;opacity:.85}
.label small{opacity:.6;font-weight:600}
kbd{font-family:ui-monospace,"SF Mono",monospace;font-size:13px;font-weight:800;background:#fff;border:2px solid rgba(0,0,0,.18);border-bottom-width:3px;border-radius:7px;padding:2px 8px;line-height:1;white-space:nowrap}
.kiosk{width:1280px;height:800px;border-radius:20px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.55);background:var(--bg);position:relative}
.behind{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:160px;opacity:.22;filter:blur(2px)}
.dim{position:absolute;inset:0;background:rgba(33,33,33,.5)}
.modal{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:560px;background:#fff;border-radius:28px;box-shadow:0 24px 70px rgba(0,0,0,.5);padding:38px 40px;text-align:center}
.emoji{font-size:74px}
.q{font-size:34px;font-weight:900;margin-top:10px}
.q b{color:var(--error)}
.thumbprev{width:200px;height:150px;border-radius:16px;background:#cdd6dd;margin:22px auto 8px;display:flex;align-items:flex-end;justify-content:center;font-size:78px;color:#90a0ab;position:relative;border:4px solid var(--error)}
.thumbprev .ix{position:absolute;top:6px;left:10px;font-size:18px;font-weight:900;color:#5a6b7a;background:#fff;border-radius:8px;padding:2px 8px}
.sub{font-size:19px;color:var(--ink2);font-weight:700;margin-top:6px}
.row{display:flex;gap:16px;margin-top:30px}
.btn{flex:1;height:78px;border-radius:18px;font-weight:900;font-size:21px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}
.btn .ks{font-size:13px;font-weight:800;opacity:.85}
.cancel{background:#fff;border:3px solid var(--ink2);color:var(--ink2)}
.cancel kbd{border-color:#bbb;color:var(--ink2)}
.del{background:linear-gradient(135deg,#C62828,#E53935);border:none;color:#fff;box-shadow:0 8px 22px rgba(198,40,40,.4)}
.del kbd{background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.4);color:#fff}
.deffocus{outline:4px solid #90A4AE;outline-offset:3px}
</style></head>
<body>
<div class="label">Màn 4 — Xác nhận xoá frame <small>· con trỏ MẶC ĐỊNH ở "Thôi để lại" để tránh xoá nhầm · Enter = xoá, Esc = thôi</small></div>
<div class="kiosk">
  <div class="behind">🎬</div>
  <div class="dim"></div>
  <div class="modal">
    <div class="emoji">🗑️</div>
    <div class="q">Xoá <b>tấm số 5</b> nhé?</div>
    <div class="thumbprev"><span class="ix">5</span>🦖</div>
    <div class="sub">Tấm này sẽ biến mất khỏi phim của bé.</div>
    <div class="row">
      <button class="btn cancel deffocus">↩️ Thôi, để lại<span class="ks"><kbd>Esc</kbd></span></button>
      <button class="btn del">🗑️ Xoá đi!<span class="ks"><kbd>Enter</kbd> hoặc <kbd>Del</kbd></span></button>
    </div>
  </div>
</div>
</body></html>
