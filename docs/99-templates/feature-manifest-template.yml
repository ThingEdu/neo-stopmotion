# docs/01-specs/features/<feature-key>/manifest.yml
feature_key: "<feature-key>"
title: "[Tên feature]"
owner_spec: "ba"

# Phạm vi thay parity_mode (dự án đơn nền tảng):
#   app      — chỉ phần mềm Python (src/)
#   firmware — chỉ firmware ThingBot (firmware/)
#   both     — cả hai; giao thức UART app↔firmware phải khớp
scope: "app"   # app | firmware | both

status: "draft"        # draft | approved | in_progress | done
ui: "no"               # yes | no
design_required: "no"  # yes | no  (yes ⇒ cần design spec của ux-designer)
design_ref: "N/A"

# Nếu giao hàng nhiều đợt:
staged_config:
  enabled: false
  due_date: ""
  ticket: ""

# Đánh dấu thông tin còn thiếu để unblock:
blocked: false
blocked_reasons: []
